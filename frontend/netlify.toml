# ============================================================================
# ZAI FLOW 2.0 - Netlify Deployment Configuration
# ============================================================================

[build]
  # No build command needed - static site
  command = ""
  publish = "."
  # Note: _redirects file handles SPA routing (do not duplicate redirects here)

# ============================================================================
# HEADERS - Security and Performance
# ============================================================================
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent caching of HTML files (they contain app logic)
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/assets/*"
  [headers.values]
    # Cache assets for 1 year (they have version hashes)
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    # Cache JS for 1 year
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/style.css"
  [headers.values]
    # Cache CSS for 1 year
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ============================================================================
# ENVIRONMENT VARIABLES
# ============================================================================
# Set these in Netlify Dashboard under Site Settings → Build & Deploy → Environment
# Example:
# SUPABASE_URL=https://your-project.supabase.co
# SUPABASE_ANON_KEY=your-anon-key

[context.production.environment]
  # Production environment variables (add in Netlify dashboard)

[context.preview.environment]
  # Preview environment variables (add in Netlify dashboard)

