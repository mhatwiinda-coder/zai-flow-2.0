<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Management - ZAI FLOW 2.0</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .management-container {
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .management-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      border-radius: 8px;
      margin-bottom: 30px;
    }

    .management-header h1 {
      margin: 0;
      font-size: 28px;
    }

    .users-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .user-card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      border: 2px solid #e9ecef;
    }

    .user-card:hover {
      border-color: #667eea;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
    }

    .user-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 15px;
    }

    .user-info h3 {
      margin: 0 0 5px 0;
      color: #333;
      font-size: 16px;
    }

    .user-email {
      color: #666;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .user-role-badge {
      display: inline-block;
      padding: 6px 12px;
      background: #667eea;
      color: white;
      border-radius: 4px;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .role-selector {
      margin-top: 15px;
    }

    .role-selector label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #333;
      font-size: 13px;
    }

    .role-selector select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      box-sizing: border-box;
    }

    .role-actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .btn-assign {
      flex: 1;
      padding: 8px 12px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
    }

    .btn-assign:hover {
      background: #218838;
    }

    .btn-remove {
      flex: 1;
      padding: 8px 12px;
      background: #dc3545;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
    }

    .btn-remove:hover {
      background: #c82333;
    }

    .current-roles {
      background: #f8f9fa;
      padding: 10px;
      border-radius: 4px;
      margin-top: 12px;
      font-size: 12px;
    }

    .current-roles strong {
      display: block;
      margin-bottom: 6px;
      color: #333;
    }

    .roles-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .role-tag {
      background: #667eea;
      color: white;
      padding: 4px 8px;
      border-radius: 3px;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .role-tag .remove-role {
      cursor: pointer;
      font-weight: bold;
    }

    .empty-message {
      text-align: center;
      color: #999;
      padding: 40px 20px;
      font-size: 14px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }

    .success-message {
      background: #d4edda;
      color: #155724;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 20px;
    }

    .error-message {
      background: #f8d7da;
      color: #721c24;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 20px;
    }

    .filter-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-input {
      flex: 1;
      min-width: 200px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
    }

    .filter-btn {
      padding: 10px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    .filter-btn:hover {
      background: #5568d3;
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-brand">
        <h2>ZAI FLOW 2.0</h2>
      </div>
      <div class="nav-menu">
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="admin-user-management.html" class="nav-link active">User Management</a>
        <a href="admin-roles.html" class="nav-link">Role Management</a>
        <a href="#" id="logout-link" class="nav-link">Logout</a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="management-container">
    <!-- Header -->
    <div class="management-header">
      <h1>👥 User Management</h1>
      <p>Assign roles and control access for all users in your business</p>
    </div>

    <!-- Messages -->
    <div id="successMessage" class="success-message" style="display: none;"></div>
    <div id="errorMessage" class="error-message" style="display: none;"></div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <input
        type="text"
        id="searchUsers"
        class="filter-input"
        placeholder="Search users by name or email..."
      />
      <button class="filter-btn" onclick="searchUsersFunction()">🔍 Search</button>
      <button class="filter-btn" style="background: #6c757d;" onclick="loadAllUsers()">
        🔄 Reset
      </button>
    </div>

    <!-- Users Grid -->
    <div id="usersContainer" class="users-grid">
      <div class="loading">Loading users...</div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-init.js"></script>
  <script src="js/branch-context.js"></script>
  <script src="js/display-branch-context.js"></script>
  <script src="js/admin-user-management.js"></script>
</body>
</html>
