# ============================================================================
# ZAI FLOW 2.0 - Root Netlify Configuration
# Configures: Static site (frontend), Serverless Functions, and Routing
# ============================================================================

[build]
  publish = "frontend"
  command = ""

# ============================================================================
# SERVERLESS FUNCTIONS
# ============================================================================
[functions]
  directory = "netlify/functions"

# ============================================================================
# SPA ROUTING - Handle all routes with login.html
# ============================================================================
[[redirects]]
  from = "/*"
  to = "/login.html"
  status = 200

# ============================================================================
# HEADERS - Security and Performance
# ============================================================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
