# ============================================================================
# ZAI FLOW 2.0 - Root Netlify Configuration
# Configures: Static site (frontend), Serverless Functions, and Routing
# ============================================================================

[build]
  command = ""

# ============================================================================
# ENVIRONMENT VARIABLES
# ============================================================================
# Set these in Netlify UI under Settings > Build & deploy > Environment
# - SUPABASE_URL: https://jzhwlablyxaeupvtpdce.supabase.co
# - SUPABASE_ANON_KEY: your_public_key_here
[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "frontend/js/supabase-init.js"
  PUBLISH_DIR = "frontend"

# ============================================================================
# SERVERLESS FUNCTIONS
# ============================================================================
[functions]
  directory = "netlify/functions"

# ============================================================================
# SPA ROUTING - Serve HTML files directly, fallback to login for API-like routes
# ============================================================================
# HTML files should be served directly
[[redirects]]
  from = "/:page.html"
  to = "/:page.html"
  status = 200
  force = true

# Assets and static files
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/js/*"
  to = "/js/:splat"
  status = 200
  force = true

# For non-HTML routes, redirect to login (SPA entry point)
[[redirects]]
  from = "/*"
  to = "/login.html"
  status = 200

# ============================================================================
# HEADERS - Security and Performance
# ============================================================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
